<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember.js</title>
  </head>
  <body>
    <script type="module">
      // Ensure decorator-transforms runtime is available globally
      import * as _dt from 'decorator-transforms/runtime';
      globalThis.dt7948 = _dt;
    </script>
    <script type="module">
      import 'qunit/qunit/qunit.js';
      import 'qunit/qunit/qunit.css';

      window.EmberENV = {};

      // In GXT mode, use synchronous observers to match standard Ember behavior.
      // Tests expect observers to fire synchronously during notifyPropertyChange.
      EmberENV._DEFAULT_ASYNC_OBSERVERS = false;

      // Handle testing feature flags
      if (QUnit.urlParams.ENABLE_OPTIONAL_FEATURES) {
        EmberENV.ENABLE_OPTIONAL_FEATURES = true;
      }

      EmberENV['RAISE_ON_DEPRECATION'] = QUnit.urlParams.RAISE_ON_DEPRECATION
        ? QUnit.urlParams.RAISE_ON_DEPRECATION === 'true'
        : true;

      if (QUnit.urlParams.ALL_DEPRECATIONS_ENABLED) {
        EmberENV['_ALL_DEPRECATIONS_ENABLED'] = true;
      }

      if (QUnit.urlParams.OVERRIDE_DEPRECATION_VERSION) {
        EmberENV['_OVERRIDE_DEPRECATION_VERSION'] = QUnit.urlParams.OVERRIDE_DEPRECATION_VERSION;
      }

      QUnit.config.urlConfig.push({
        id: 'OVERRIDE_DEPRECATION_VERSION',
        value: ['20.0.0', '6.0.0', '5.12.0'],
        label: 'Deprecation Version',
      });

      QUnit.config.urlConfig.push({
        id: 'skip_tests_with_target_blank',
        label: 'Skip tests w/ target _blank',
      });

      // Set a test timeout to prevent individual tests from hanging forever
      // This is especially important in GXT mode where some rendering operations
      // can cause infinite backburner loops
      QUnit.config.testTimeout = 10000; // 10 seconds per test

      // --- GXT global test hooks ---
      // These run for EVERY test, regardless of which test-case base class is used.
      // They ensure GXT state is clean at the start of each test and cleaned up
      // after each test, preventing phantom failures from leaked state.

      QUnit.testStart(function() {
        // Signal that we're no longer in a test transition
        globalThis.__gxtTestTransition = false;
        // Reset the operation counter so each test gets a fresh budget
        if (globalThis.__gxtOpCount !== undefined) {
          globalThis.__gxtOpCount = 0;
        }
        // Force-reset __gxtSyncing in case a previous test left it stuck true
        // (e.g., an error thrown inside __gxtSyncDomNow that escaped the finally block)
        globalThis.__gxtSyncing = false;
        // Clean up GXT state BEFORE the test starts. If a prior test's afterEach
        // failed or didn't fully clean up, this ensures a clean slate.
        var cleanup = globalThis.__gxtCleanupActiveComponents;
        if (typeof cleanup === 'function') {
          try { cleanup(); } catch(e) { /* ignore cleanup errors */ }
        }
        // Reset sync flags that the cleanup might not cover
        globalThis.__gxtPendingSync = false;
        globalThis.__gxtPendingSyncFromPropertyChange = false;
        globalThis.__gxtDeferredSyncError = null;
        globalThis.__gxtForceRerenderInProgress = false;
        // Reset the interval sync budget so the fallback timer works for this test
        if (typeof globalThis.__gxtResetIntervalBudget === 'function') {
          globalThis.__gxtResetIntervalBudget();
        }
      });

      QUnit.testDone(function() {
        // Signal that we're between tests — interval timer should not fire
        globalThis.__gxtTestTransition = true;
        // Safety net: reset syncing flag after each test in case it got stuck
        globalThis.__gxtSyncing = false;
        globalThis.__gxtPendingSync = false;
        globalThis.__gxtPendingSyncFromPropertyChange = false;
        globalThis.__gxtDeferredSyncError = null;
        globalThis.__gxtForceRerenderInProgress = false;
        // Reset op counter
        if (globalThis.__gxtOpCount !== undefined) {
          globalThis.__gxtOpCount = 0;
        }
      });
    </script>

    <script>
      // Set GXT mode flag BEFORE any modules load so renderer.ts can check it
      // during module initialization (before compile.ts sets it)
      globalThis.__GXT_MODE__ = true;

      // Global operation counter to detect infinite synchronous loops
      // Any tight loop will increment this. When it exceeds the limit,
      // we throw to break out of the loop.
      globalThis.__gxtOpCount = 0;
      globalThis.__gxtOpLimit = 500000; // 500K operations before we break
      globalThis.__gxtOpCheck = function() {
        if (++globalThis.__gxtOpCount > globalThis.__gxtOpLimit) {
          globalThis.__gxtOpCount = 0;
          throw new Error('[GXT] Operation limit exceeded - breaking infinite loop');
        }
      };
    </script>

    <script type="module">
      // Import GXT compat layer FIRST to register runtime compiler before templates load
      // This must happen before any @ember modules are imported
      import './packages/demo/compat/ember-template-compiler.ts';

      import setupQUnit from './packages/internal-test-helpers/lib/ember-dev/setup-qunit.ts';
      import { setTesting } from './packages/@ember/debug/index.ts';
      setupQUnit();
      setTesting(true);

      let s = document.createElement('script');
      s.src = '/testem.js';
      document.body.append(s);
    </script>

    <script type="module">
      // tests in internal packages
      import.meta.glob('./packages/@ember/-internals/*/tests/**/*.{js,ts,gjs,gts}', {
        eager: true,
      });

      // tests in scoped packages
      import.meta.glob('./packages/*/*/tests/**/*.{js,ts,gjs,gts}', {
        eager: true,
      });

      // tests in non-scoped packages
      import.meta.glob('./packages/*/tests/**/*.{js,ts,gjs,gts}', {
        eager: true,
      });

      // packages originally authored in glimmer-vm repo have a different test
      // naming convention
      import.meta.glob(
        './packages/{@glimmer,@glimmer-workspace}/*/test/**/*-test.{js,ts,gjs,gts}',
        {
          eager: true,
        }
      );
    </script>

    <div id="qunit"></div>
    <div id="qunit-fixture"></div>
  </body>
</html>
