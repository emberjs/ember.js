    <script>
      // Disable autostart - we'll start after tests are registered
      QUnit.config.autostart = false;
      // Set a per-test timeout to prevent hangs
      QUnit.config.testTimeout = 30000; // 30 seconds per test

      // Setup result collection BEFORE tests run
      window.__qunitResults = {
        passed: 0,
        failed: 0,
        skipped: 0,
        total: 0,
        failures: [],
        runtime: 0,
        done: false,
      };

      QUnit.done(function(details) {
        window.__qunitResults.passed = details.passed;
        window.__qunitResults.failed = details.failed;
        window.__qunitResults.total = details.total;
        window.__qunitResults.runtime = details.runtime;
        window.__qunitResults.done = true;
        console.log('[QUnit] Done:', details.passed + '/' + details.total);
      });

      QUnit.testDone(function(details) {
        if (details.failed > 0) {
          window.__qunitResults.failures.push({
            module: details.module,
            name: details.name,
            failed: details.failed,
            passed: details.passed,
            total: details.total,
            assertions: [],
          });
        }
      });

      QUnit.log(function(details) {
        if (!details.result && window.__qunitResults.failures.length > 0) {
          var lastFailure = window.__qunitResults.failures[window.__qunitResults.failures.length - 1];
