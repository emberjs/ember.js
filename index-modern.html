<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember.js (modern variant)</title>
  </head>
  <body>
    <!--
      Test entry for the modern build variant (MODERN=1): module swaps and
      legacy-feature flag folding are applied by vite.config.mjs and
      babel.test.config.mjs, and only suites whose subject matter and test
      code are free of the classic object model are loaded. Grow the globs
      below as more suites become modern-clean.
    -->
    <script type="module">
      import 'qunit/qunit/qunit.js';
      import 'qunit/qunit/qunit.css';

      window.EmberENV = {};

      // Test under octane defaults
      EmberENV._DEFAULT_ASYNC_OBSERVERS = true;

      EmberENV['RAISE_ON_DEPRECATION'] = QUnit.urlParams.RAISE_ON_DEPRECATION
        ? QUnit.urlParams.RAISE_ON_DEPRECATION === 'true'
        : true;
    </script>

    <script type="module">
      import setupQUnit from './packages/internal-test-helpers/lib/ember-dev/setup-qunit.ts';
      import { setTesting } from './packages/@ember/debug/index.ts';
      setupQUnit();
      setTesting(true);

      let s = document.createElement('script');
      s.src = '/testem.js';
      document.body.append(s);
    </script>

    <script type="module">
      import.meta.glob('./packages/@ember/-internals/utils/tests/**/*.{js,ts,gjs,gts}', {
        eager: true,
      });

      import.meta.glob('./packages/@ember/runloop/tests/**/*.{js,ts,gjs,gts}', {
        eager: true,
      });

      // packages originally authored in glimmer-vm repo have a different test
      // naming convention
      import.meta.glob(
        './packages/{@glimmer,@glimmer-workspace}/*/test/**/*-test.{js,ts,gjs,gts}',
        {
          eager: true,
        }
      );
    </script>

    <div id="qunit"></div>
    <div id="qunit-fixture"></div>
  </body>
</html>
