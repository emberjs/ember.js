packages:
  - 'packages/*'
  - 'packages/@ember/*'
  - 'packages/@glimmer/*'
  - 'packages/@glimmer-workspace/*'
  - 'packages/@handlebars/*'
  - 'packages/@types/*'
  - 'packages/*/*/test'
  - 'smoke-tests/*'
  - 'tests/*'

allowBuilds:
  '@swc/core': true
  core-js: false
  esbuild: true

overrides:
  rollup: ^4.2.0
  ember-cli-htmlbars: ^7.0.0
  babel-plugin-ember-template-compilation: ^4.0.0
  ember-cli-babel: ^8.3.1
  socket.io: ^4.7.0

patchedDependencies:
  '@tracerbench/core@8.0.1': patches/@tracerbench__core@8.0.1.patch
  agadoo: patches/agadoo.patch
